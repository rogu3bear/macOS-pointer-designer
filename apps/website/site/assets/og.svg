<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EAF1F8"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="windowFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="60" y="64" width="226" height="44" rx="22" fill="#DBEAFE"/>
  <circle cx="86" cy="86" r="8" fill="#2563EB"/>
  <text x="102" y="93" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#1E3A8A">WindowDrop</text>

  <text x="60" y="162" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="62" font-weight="700" fill="#0F172A">
    New windows appear where
  </text>
  <text x="60" y="225" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="62" font-weight="700" fill="#0F172A">
    your cursor is.
  </text>
  <text x="60" y="270" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" fill="#334155">
    Press Cmd+N and WindowDrop places the new window under your mouse.
  </text>

  <g transform="translate(520 86)">
    <rect x="0" y="0" width="620" height="456" rx="24" fill="#FFFFFF" stroke="#DDE5EF" stroke-width="2"/>
    <rect x="0" y="0" width="620" height="36" rx="24" fill="#EEF2F7"/>
    <rect x="0" y="20" width="620" height="16" fill="#EEF2F7"/>

    <rect x="24" y="54" width="270" height="374" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="44" y="86" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#475569">
      Default Cmd+N
    </text>

    <g transform="translate(56 126)">
      <rect x="0" y="0" width="168" height="118" rx="10" fill="url(#windowFill)" stroke="#CBD5E1" filter="url(#shadow)"/>
      <rect x="0" y="0" width="168" height="18" rx="10" fill="#E2E8F0"/>
      <rect x="0" y="8" width="168" height="10" fill="#E2E8F0"/>
    </g>
    <g transform="translate(40 154)">
      <rect x="0" y="0" width="168" height="118" rx="10" fill="url(#windowFill)" stroke="#94A3B8" stroke-width="2" filter="url(#shadow)"/>
      <rect x="0" y="0" width="168" height="18" rx="10" fill="#DCE3EA"/>
      <rect x="0" y="8" width="168" height="10" fill="#DCE3EA"/>
    </g>
    <text x="44" y="328" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" fill="#64748B">
      New window stacks on old one
    </text>

    <rect x="325" y="54" width="270" height="374" rx="16" fill="#F0F9FF" stroke="#BFDBFE"/>
    <text x="345" y="86" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#1D4ED8">
      With WindowDrop
    </text>

    <g transform="translate(370 162)">
      <rect x="0" y="0" width="190" height="132" rx="10" fill="url(#windowFill)" stroke="#2563EB" stroke-width="2.4" filter="url(#shadow)"/>
      <rect x="0" y="0" width="190" height="22" rx="10" fill="#DBEAFE"/>
      <rect x="0" y="10" width="190" height="12" fill="#DBEAFE"/>
      <circle cx="16" cy="12" r="4" fill="#EF4444"/>
      <circle cx="31" cy="12" r="4" fill="#F59E0B"/>
      <circle cx="46" cy="12" r="4" fill="#22C55E"/>
    </g>

    <g transform="translate(340 136)">
      <path d="M0 0 L0 35 L10 26 L18 45 L27 41 L19 23 L32 23 Z" fill="#0F172A"/>
      <circle cx="95" cy="92" r="27" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="4 4"/>
      <line x1="67" y1="92" x2="123" y2="92" stroke="#16A34A" stroke-width="2"/>
      <line x1="95" y1="64" x2="95" y2="120" stroke="#16A34A" stroke-width="2"/>
    </g>

    <rect x="344" y="328" width="222" height="34" rx="17" fill="#DCFCE7"/>
    <text x="455" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#166534">
      New window appears at cursor
    </text>

    <rect x="258" y="228" width="104" height="38" rx="10" fill="#0F172A"/>
    <text x="310" y="253" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, monospace" font-size="17" fill="#FFFFFF">
      Cmd+N
    </text>
  </g>
</svg>
