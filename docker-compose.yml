services:
  app:
    build: .
    container_name: drop-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3410:3410"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3410/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: drop-web-tunnel
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${TUNNEL_TOKEN}"]
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - tunnel
