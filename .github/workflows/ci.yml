name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  monorepo-guardrails:
    name: Monorepo guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check retired website references
        run: ./scripts/check-monorepo-references.sh

      - name: Check website boundary
        run: ./scripts/check-website-boundary.sh

      - name: Check distribution boundary
        run: ./scripts/check-distribution-boundary.sh

      - name: Check compatibility boundary
        run: ./scripts/check-compatibility-boundary.sh

      - name: Check local-first app boundary
        run: ./scripts/check-local-first.sh

      - name: Check app UI contract
        run: ./scripts/check-app-ui-contract.sh
