name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  monorepo-guardrails:
    name: Monorepo guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check retired website references
        run: ./scripts/check-monorepo-references.sh

  macos:
    name: macOS app
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Swift package
        run: swift test --package-path apps/macos
