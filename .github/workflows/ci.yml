name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  monorepo-guardrails:
    name: Monorepo guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install guardrail tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check retired website references
        run: ./scripts/check-monorepo-references.sh

      - name: Check local-first app boundary
        run: ./scripts/check-local-first.sh

      - name: Check app UI contract
        run: ./scripts/check-app-ui-contract.sh

  macos:
    name: macOS app
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Swift package
        run: swift test --package-path apps/macos
